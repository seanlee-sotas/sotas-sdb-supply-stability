# ---------------------------------------------------------------------------
# Scoring thresholds (per-axis) — A-F grades based on raw indicator
# ---------------------------------------------------------------------------
scoring:
  grade_breakpoints:
    A: 85   # ≥85 → A
    B: 70
    C: 55
    D: 40
    E: 25
    # < 25 → F
