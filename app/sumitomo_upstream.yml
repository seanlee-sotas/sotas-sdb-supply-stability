          - name: "ベンゼン"
            cas: "71-43-2"
            role: "BTX 芳香族"
            wb_commodity: "CRUDE_BRENT"
          - name: "エチレン"
            cas: "74-85-1"
            role: "ナフサクラッカー基幹品"
            wb_commodity: "CRUDE_BRENT"

