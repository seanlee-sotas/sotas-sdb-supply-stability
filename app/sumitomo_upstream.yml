# 住友ゴム関連物質の上流バリューチェーンマッピング
# 各物質について「原料モノマー → 石化中間体 → 原油/鉱物」へ遡る系譜
#
# 上流ノードのリスクデータ参照先:
#   cas:           既存物質と同じ CAS (chemicals.parquet + scoring) → 7軸スコア継承
#   usgs_element:  USGS Mineral Commodity Summaries 2025 の element key
#   wb_commodity:  World Bank Pink Sheet 商品コード (RUBBER_TSR20, CRUDE_BRENT 等)
#   strategic_token: 戦略物資 3国フラグの token

chains:

  # ==================== タイヤ事業 基幹 ====================

  ssbr:
    self:
      name: "溶液重合SBR (S-SBR)"
      cas: "9003-55-8"
      role: "重合体"
    parents:
      - name: "1,3-ブタジエン"
        role: "原料モノマー (60%)"
        cas: "106-99-0"
        note: "国内ENEOS/UBE/三菱ケミカル 3社寡占"
        parents:
          - name: "ナフサ (粗製ガソリン)"
            role: "石化中間体"
            wb_commodity: "CRUDE_BRENT"
            note: "ナフサクラッカー副生物としてブタジエン生成"
            parents:
              - name: "原油"
                role: "源流"
                wb_commodity: "CRUDE_BRENT"
                note: "ホルムズ海峡通過量の30%が日本向け"
      - name: "スチレン"
        role: "原料モノマー (40%)"
        cas: "100-42-5"
        note: "エチルベンゼン脱水素法"
        parents:
          - name: "エチレン + ベンゼン"
            role: "石化中間体"
            wb_commodity: "CRUDE_BRENT"
            note: "ナフサクラッカー基幹品"

  esbr:
    self:
      name: "乳化重合SBR (E-SBR)"
      cas: "9003-55-8"
      role: "重合体"
    parents:
      - name: "1,3-ブタジエン"
        role: "原料モノマー"
        cas: "106-99-0"
      - name: "スチレン"
        role: "原料モノマー"
        cas: "100-42-5"

  br:
    self:
      name: "ブタジエンゴム (BR)"
      cas: "9003-17-4"
      role: "重合体"
    parents:
      - name: "1,3-ブタジエン"
        role: "原料モノマー"
        cas: "106-99-0"

  butadiene:
    self:
      name: "1,3-ブタジエン"
      cas: "106-99-0"
      role: "モノマー"
    parents:
      - name: "ナフサ"
        role: "石化中間体"
        wb_commodity: "CRUDE_BRENT"
        note: "C4留分をスチーム分解で得る副生物"
        parents:
          - name: "原油"
            role: "源流"
            wb_commodity: "CRUDE_BRENT"

  styrene:
    self:
      name: "スチレン"
      cas: "100-42-5"
      role: "モノマー"
    parents:
      - name: "エチルベンゼン"
